name: EnthusiaPlaytime
main: org.enthusia.playtime.PlayTimePlugin
version: 3.1.2
api-version: '1.21'
author: Enthusia
description: Advanced playtime tracking with AFK detection, GUIs, leaderboards, admin tools, and PlaceholderAPI support.

softdepend:
  - Plan
  - PlaceholderAPI
  - ProtocolLib
  - floodgate
  - Geyser-Spigot

commands:
  playtime:
    description: View your playtime, open GUIs, or admin tools.
    usage: /playtime
    aliases: [pt]
  roman:
    description: Show playtime roman numeral tiers.
    usage: /roman
    aliases: [numerals, rn]
  firstjoin:
    description: Show when a player first joined according to this plugin's storage.
    usage: /firstjoin [player]
    aliases: [fj]
  seen:
    description: Check when a player was last seen according to this plugin's storage.
    usage: /seen [player]

permissions:
  playtime.base:
    default: true
    description: Use /playtime, /roman, and the main GUIs.
  playtime.others:
    default: false
    description: View playtime for another player.
  playtime.firstjoined:
    default: true
    description: Use /firstjoin.
  playtime.seen:
    default: false
    description: Use /seen to check when players were last online.
  playtime.admin.base:
    default: op
    description: Open admin GUI screens.
  playtime.admin.reload:
    default: op
    description: Reload the playtime plugin safely in-place.
  playtime.admin.debug:
    default: op
    description: View runtime debug information.
