storage:
  # sqlite is the intended default target.
  # mysql and mariadb remain supported for future scale-out if you decide to move later.
  type: sqlite

  sqlite:
    file: "playtime.db"

  mysql:
    host: "localhost"
    port: 3306
    database: "playtime"
    username: "root"
    password: "password"
    use-ssl: false
    pool-size: 10

  # How often the buffered minute writer flushes to storage.
  # The plugin batches writes in memory between flushes to reduce disk churn.
  flush-interval-ticks: 1200

sampling:
  # Reserved for future higher-frequency sampling work.
  tick-interval: 20

  # Legacy-compatible aliases are still accepted internally:
  # idle_seconds / afk_seconds will continue to work if they already exist.
  idle-seconds: 60
  afk-seconds: 300

  suspicion:
    enabled: true

    # Look at click timing inside this moving window.
    window-seconds: 20

    # Minimum clicks/swings in the window before regularity is judged.
    min-swings: 25

    # Lower values mean more perfectly regular clicking is required before the player is marked suspicious.
    max-cv: 0.08

    # Require this much non-click inactivity before suspicious-click logic can apply.
    non-click-grace-seconds: 10

    # Suspicious time still counts as active playtime for the first N consecutive suspicious minutes.
    # Once the streak exceeds this threshold, suspicious minutes stop counting until the player
    # returns to a non-suspicious state.
    max-counted-consecutive-minutes: 10

chat:
  count-chat-as-activity: true
  count-commands-as-activity: true

joins:
  # <= 0 keeps all join records forever.
  retention-days: -1

  # Used for first-join / seen formatting and join-range admin stats.
  timezone: "America/New_York"

  first-join:
    enabled: true

    # This plugin now uses plugin-owned storage to determine true first joins.
    broadcast: "&a+ &f%player% &7just joined for the first time! Make them feel welcome."

    player-message:
      - "&aWelcome to Enthusia, %player%!"
      - "&7Use &b/tutorial &7for a quick start or ask in chat."

    ping:
      enabled: true
      sound: BLOCK_NOTE_BLOCK_PLING
      volume: 1.25
      pitch: 1.6

leaderboards:
  default-metric: "total"
  default-range: "all"

  # Cache TTL for leaderboard/admin/stat reads.
  cache-ttl-seconds: 30

  export:
    # Writes one website-safe JSON snapshot under the plugin data folder:
    # board: playtime-active-all, top 100, ordered by all-time active minutes.
    # The website/API can read these files without connecting to the Minecraft plugin.
    enabled: true
    directory: "public-leaderboards"
    interval-seconds: 300

analytics:
  # Optional Plan Player Analytics integration. Requires the Plan plugin to be installed.
  # When enabled, this plugin exposes stored playtime and join analytics through Plan's DataExtension API.
  plan:
    enabled: true

  # Retention for hourly playtime aggregates used for true rolling 24-hour analytics.
  hourly-retention-days: 90

gui:
  enabled: true
  filler-material: GRAY_STAINED_GLASS_PANE

  bedrock:
    enabled: true
    main-menu-rows: 5
    leaderboard-rows: 6

placeholders:
  enabled: true

ux:
  show-afk-title: false

  actionbar:
    enabled: true
    show-active: false
    show-idle: false
    show-afk: true
    show-suspicious: true

    text:
      active: "Playing"
      idle: "Idle"
      afk: "AFK"
      suspicious: "Suspicious input"

debug:
  enabled: false
  log-suspicious: true
